name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: input
    id: version
    attributes:
      label: socketcan version
      description: Output of `npm list socketcan`
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Linux distribution and kernel
      description: e.g. Ubuntu 24.04, kernel 6.8.0
    validations:
      required: true

  - type: dropdown
    id: interface
    attributes:
      label: CAN interface type
      options:
        - Virtual (vcan)
        - Physical hardware
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: A short script or test case that reproduces the issue.
      render: javascript
    validations:
      required: false
